name: Build Docker Images
run-name: Build Images [${{ github.event.inputs.mode || 'single' }}:${{ github.event.inputs.build_target || 'n/a' }}${{ github.event.inputs.stop_after && format(':{0}', github.event.inputs.stop_after) || '' }}]

on:
    workflow_dispatch:
        inputs:
            mode:
                default: "single"
                description: "single = one image; chain = run ordered pipeline starting at start_at"
                options: [ "single", "chain" ]
                required: true
                type: choice
            build_target:
                default: "debian"
                description: "Image name (debian, postgres, nginx). Context-aware based on mode."
                options: [ "debian", "action-split", "nginx", "postgres", "go", "curl", "php-zts-base-master", "php-zts-master", "php-zts-testing-master", "php-franken-master", "php-franken-testing-master", "php-fpm-base-master", "php-fpm-master", "php-fpm-testing-master", "php-fpm-socket-master", "php-zts-base", "php-zts", "php-zts-testing", "php-franken", "php-franken-testing", "php-fpm-base", "php-fpm", "php-fpm-testing", "php-fpm-socket", ]
                required: true
                type: choice
            no_cache:
                default: "false"
                description: "Build with --no-cache"
                options: [ "true", "false" ]
                required: false
                type: choice
            stop_after:
                default: ""
                description: "Stop building after this image (chain mode only)"
                options: [ "", "debian", "action-split", "nginx", "postgres", "go", "curl", "php-zts-base-master", "php-zts-master", "php-zts-testing-master", "php-franken-master", "php-franken-testing-master", "php-fpm-base-master", "php-fpm-master", "php-fpm-testing-master", "php-fpm-socket-master", "php-zts-base", "php-zts", "php-zts-testing", "php-franken", "php-franken-testing", "php-fpm-base", "php-fpm", "php-fpm-testing", "php-fpm-socket", ]
                required: false
                type: choice

permissions:
    contents: read
    packages: write

env:
    OWNER: ghcr.io/valksor
    PHP_OWNER: ghcr.io/valksor/php
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    plan:
        runs-on: self-arm
        outputs:
            run_list: ${{ steps.plan.outputs.run_list }}
            arm_only_needed: ${{ steps.plan.outputs.arm_only_needed }}
        steps:
            -   name: Plan run list
                id: plan
                shell: bash
                env:
                    MODE: ${{ github.event.inputs.mode }}
                    BUILD_TARGET: ${{ github.event.inputs.build_target }}
                    STOP_AFTER: ${{ github.event.inputs.stop_after }}
                run: |
                    set -euo pipefail
                    ORDER=(debian action-split nginx postgres go curl php-zts-base-master php-zts-master php-zts-testing-master php-franken-master php-franken-testing-master php-fpm-base-master php-fpm-master php-fpm-testing-master php-fpm-socket-master php-zts-base php-zts php-zts-testing php-franken php-franken-testing php-fpm-base php-fpm php-fpm-testing php-fpm-socket)
                    ARM_ONLY_TARGETS=(curl php-zts-base-master php-zts-master php-zts-testing-master php-franken-master php-franken-testing-master php-fpm-base-master php-fpm-master php-fpm-testing-master php-fpm-socket-master php-zts-base php-zts php-zts-testing php-franken php-franken-testing php-fpm-base php-fpm php-fpm-testing php-fpm-socket)

                    RUN_LIST=()

                    if [[ "$MODE" == "single" ]]; then
                        RUN_LIST=("$BUILD_TARGET")
                    else
                        start_target="$BUILD_TARGET"
                        RUN=false
                        STOPPED=false
                        for s in "${ORDER[@]}"; do
                            if [[ "$s" == "$start_target" ]]; then RUN=true; fi
                            if $RUN && ! $STOPPED; then
                                RUN_LIST+=("$s")
                                if [[ -n "$STOP_AFTER" && "$s" == "$STOP_AFTER" ]]; then
                                    STOPPED=true
                                fi
                            fi
                        done
                    fi

                    PADDED=" ${RUN_LIST[*]} "
                    echo "run_list=$PADDED" >> "$GITHUB_OUTPUT"

                    ARM_ONLY_NEEDED=false
                    for t in "${ARM_ONLY_TARGETS[@]}"; do
                        if [[ "$PADDED" == *" $t "* ]]; then
                            ARM_ONLY_NEEDED=true
                            break
                        fi
                    done
                    echo "arm_only_needed=$ARM_ONLY_NEEDED" >> "$GITHUB_OUTPUT"

                    echo "MODE=$MODE"
                    echo "BUILD_TARGET=$BUILD_TARGET"
                    echo "STOP_AFTER=$STOP_AFTER"
                    echo "RUN_LIST=${RUN_LIST[*]}"
                    echo "ARM_ONLY_NEEDED=$ARM_ONLY_NEEDED"

    # -------------------------
    # debian / action-split / nginx — generic build-simple images via reusable workflow
    # -------------------------

    debian:
        needs: plan
        if: contains(needs.plan.outputs.run_list, ' debian ')
        uses: ./.github/workflows/_multiarch-image.yml
        with:
            dockerfile: debian/Dockerfile
            image: ghcr.io/valksor/debian
            build_args: |
                CACHE_BUSTER=${{ github.run_id }}
            no_cache: ${{ github.event.inputs.no_cache }}
        secrets: inherit

    action-split:
        needs: [plan, debian]
        if: |
            always()
            && contains(needs.plan.outputs.run_list, ' action-split ')
            && needs.debian.result != 'failure'
            && needs.debian.result != 'cancelled'
        uses: ./.github/workflows/_multiarch-image.yml
        with:
            dockerfile: action/split/Dockerfile
            image: ghcr.io/valksor/action/split
            no_cache: ${{ github.event.inputs.no_cache }}
        secrets: inherit

    nginx:
        needs: [plan, action-split]
        if: |
            always()
            && contains(needs.plan.outputs.run_list, ' nginx ')
            && needs.action-split.result != 'failure'
            && needs.action-split.result != 'cancelled'
        uses: ./.github/workflows/_multiarch-image.yml
        with:
            dockerfile: nginx/Dockerfile
            image: ghcr.io/valksor/nginx
            no_cache: ${{ github.event.inputs.no_cache }}
        secrets: inherit

    # -------------------------
    # postgres — uses build-postgres + manifest-postgres (per-version tags)
    # -------------------------

    postgres-build:
        needs: [plan, nginx]
        if: |
            always()
            && contains(needs.plan.outputs.run_list, ' postgres ')
            && needs.nginx.result != 'failure'
            && needs.nginx.result != 'cancelled'
        strategy:
            fail-fast: false
            matrix:
                include:
                    -   arch: arm64
                        runs-on: self-arm
                    -   arch: amd64
                        runs-on: ubuntu-latest
        runs-on: ${{ matrix.runs-on }}
        steps:
            -   name: checkout
                uses: actions/checkout@v6
            -   name: Login GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Login DockerHub
                uses: docker/login-action@v3
                with:
                    registry: docker.io
                    username: ${{ secrets.DH_USERNAME }}
                    password: ${{ secrets.DH_TOKEN }}
            -   name: build postgres
                uses: ./.github/actions/build-postgres
                with:
                    versions: "17 18"
                    dockerfile: postgres/Dockerfile
                    image: ${{ env.OWNER }}/postgres
                    arch: ${{ matrix.arch }}
                    no_cache: ${{ github.event.inputs.no_cache }}

    postgres-manifest:
        needs: [plan, postgres-build]
        runs-on: self-arm
        if: always() && needs.postgres-build.result == 'success'
        steps:
            -   name: checkout
                uses: actions/checkout@v6
            -   name: Login GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: manifest postgres
                uses: ./.github/actions/manifest-postgres
                with:
                    versions: "17 18"
                    image: ${{ env.OWNER }}/postgres

    # -------------------------
    # go — uses build-go (downloads Go tarball per arch)
    # -------------------------

    go-build:
        needs: [plan, postgres-build, postgres-manifest]
        if: |
            always()
            && contains(needs.plan.outputs.run_list, ' go ')
            && (needs.postgres-build.result == 'success' || needs.postgres-build.result == 'skipped')
            && (needs.postgres-manifest.result == 'success' || needs.postgres-manifest.result == 'skipped')
        strategy:
            fail-fast: false
            matrix:
                include:
                    -   arch: arm64
                        runs-on: self-arm
                    -   arch: amd64
                        runs-on: ubuntu-latest
        runs-on: ${{ matrix.runs-on }}
        steps:
            -   name: checkout
                uses: actions/checkout@v6
            -   name: Login GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Login DockerHub
                uses: docker/login-action@v3
                with:
                    registry: docker.io
                    username: ${{ secrets.DH_USERNAME }}
                    password: ${{ secrets.DH_TOKEN }}
            -   name: build go
                uses: ./.github/actions/build-go
                with:
                    version: latest
                    dockerfile: go/Dockerfile
                    arch: ${{ matrix.arch }}
                    tags: |
                        ${{ env.OWNER }}/go:latest-${{ matrix.arch }}
                    no_cache: ${{ github.event.inputs.no_cache }}

    go-manifest:
        needs: [plan, go-build]
        runs-on: self-arm
        if: always() && needs.go-build.result == 'success'
        steps:
            -   name: checkout
                uses: actions/checkout@v6
            -   name: Login GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: manifest go
                uses: ./.github/actions/manifest-multiarch
                with:
                    image: ${{ env.OWNER }}/go
                    tag: latest

    # -------------------------
    # arm-only chain: curl + php-*
    # Runs after go manifest so curl/php resolve fresh bases.
    # -------------------------

    arm-only-build:
        needs: [plan, go-build, go-manifest]
        runs-on: self-arm
        if: |
            always()
            && needs.plan.outputs.arm_only_needed == 'true'
            && (needs.go-build.result == 'success' || needs.go-build.result == 'skipped')
            && (needs.go-manifest.result == 'success' || needs.go-manifest.result == 'skipped')
        steps:
            -   name: checkout
                uses: actions/checkout@v6

            -   name: Login GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Login DockerHub
                uses: docker/login-action@v3
                with:
                    registry: docker.io
                    username: ${{ secrets.DH_USERNAME }}
                    password: ${{ secrets.DH_TOKEN }}

            -   name: build curl
                if: contains(needs.plan.outputs.run_list, ' curl ')
                uses: ./.github/actions/build-curl
                with:
                    dockerfile: curl/Dockerfile
                    tags: |
                        ${{ env.OWNER }}/curl:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

            -   name: build php-zts-base-master
                if: contains(needs.plan.outputs.run_list, ' php-zts-base-master ')
                uses: ./.github/actions/build-php-zts-base
                with:
                    dockerfile: php/zts-base/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/zts-base:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"

            -   name: build php-zts-master
                if: contains(needs.plan.outputs.run_list, ' php-zts-master ')
                uses: ./.github/actions/build-php
                with:
                    dockerfile: php/zts/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/zts:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"
                    base_image: "zts-base"

            -   name: build php-zts-testing-master
                if: contains(needs.plan.outputs.run_list, ' php-zts-testing-master ')
                uses: ./.github/actions/build-php-testing
                with:
                    dockerfile: php/zts-testing/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/zts-testing:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"
                    base_image: "zts"

            -   name: build php-franken-master
                if: contains(needs.plan.outputs.run_list, ' php-franken-master ')
                uses: ./.github/actions/build-php-franken
                with:
                    dockerfile: php/franken/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/franken:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"

            -   name: build php-franken-testing-master
                if: contains(needs.plan.outputs.run_list, ' php-franken-testing-master ')
                uses: ./.github/actions/build-php-franken-testing
                with:
                    dockerfile: php/franken-testing/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/franken-testing:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"

            -   name: build php-fpm-base-master
                if: contains(needs.plan.outputs.run_list, ' php-fpm-base-master ')
                uses: ./.github/actions/build-php-base
                with:
                    dockerfile: php/base/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/fpm-base:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"

            -   name: build php-fpm-master
                if: contains(needs.plan.outputs.run_list, ' php-fpm-master ')
                uses: ./.github/actions/build-php
                with:
                    dockerfile: php/fpm/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/fpm:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"

            -   name: build php-fpm-testing-master
                if: contains(needs.plan.outputs.run_list, ' php-fpm-testing-master ')
                uses: ./.github/actions/build-php-testing
                with:
                    dockerfile: php/testing/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/fpm-testing:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    php_branch: master
                    php_version: "8.6.0-dev"

            -   name: build php-fpm-socket-master
                if: contains(needs.plan.outputs.run_list, ' php-fpm-socket-master ')
                uses: ./.github/actions/build-php-sockets
                with:
                    dockerfile1: php/socket/Dockerfile
                    tags1: |
                        ${{ env.PHP_OWNER }}/fpm-socket:master
                    dockerfile2: php/testing-socket/Dockerfile
                    tags2: |
                        ${{ env.PHP_OWNER }}/fpm-testing-socket:master
                    no_cache: ${{ github.event.inputs.no_cache }}
                    base_tag: :master

            -   name: build php-zts-base
                if: contains(needs.plan.outputs.run_list, ' php-zts-base ')
                uses: ./.github/actions/build-php-zts-base
                with:
                    dockerfile: php/zts-base/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/zts-base:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

            -   name: build php-zts
                if: contains(needs.plan.outputs.run_list, ' php-zts ')
                uses: ./.github/actions/build-php
                with:
                    dockerfile: php/zts/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/zts:latest
                    no_cache: ${{ github.event.inputs.no_cache }}
                    base_image: "zts-base"

            -   name: build php-zts-testing
                if: contains(needs.plan.outputs.run_list, ' php-zts-testing ')
                uses: ./.github/actions/build-php-testing
                with:
                    dockerfile: php/zts-testing/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/zts-testing:latest
                    no_cache: ${{ github.event.inputs.no_cache }}
                    base_image: "zts"

            -   name: build php-franken
                if: contains(needs.plan.outputs.run_list, ' php-franken ')
                uses: ./.github/actions/build-php-franken
                with:
                    dockerfile: php/franken/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/franken:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

            -   name: build php-franken-testing
                if: contains(needs.plan.outputs.run_list, ' php-franken-testing ')
                uses: ./.github/actions/build-php-franken-testing
                with:
                    dockerfile: php/franken-testing/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/franken-testing:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

            -   name: build php-fpm-base
                if: contains(needs.plan.outputs.run_list, ' php-fpm-base ')
                uses: ./.github/actions/build-php-base
                with:
                    dockerfile: php/base/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/fpm-base:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

            -   name: build php-fpm
                if: contains(needs.plan.outputs.run_list, ' php-fpm ')
                uses: ./.github/actions/build-php
                with:
                    dockerfile: php/fpm/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/fpm:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

            -   name: build php-fpm-testing
                if: contains(needs.plan.outputs.run_list, ' php-fpm-testing ')
                uses: ./.github/actions/build-php-testing
                with:
                    dockerfile: php/testing/Dockerfile
                    tags: |
                        ${{ env.PHP_OWNER }}/fpm-testing:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

            -   name: build php-fpm-socket
                if: contains(needs.plan.outputs.run_list, ' php-fpm-socket ')
                uses: ./.github/actions/build-php-sockets
                with:
                    dockerfile1: php/socket/Dockerfile
                    tags1: |
                        ${{ env.PHP_OWNER }}/fpm-socket:latest
                    dockerfile2: php/testing-socket/Dockerfile
                    tags2: |
                        ${{ env.PHP_OWNER }}/fpm-testing-socket:latest
                    no_cache: ${{ github.event.inputs.no_cache }}

    cleanup:
        needs:
            - plan
            - debian
            - action-split
            - nginx
            - postgres-build
            - postgres-manifest
            - go-build
            - go-manifest
            - arm-only-build
        runs-on: self-arm
        if: always()
        steps:
            -   name: cleanup
                shell: bash
                run: |
                    ls -la ./
                    rm -rf ./* || true
                    rm -rf ./.??* || true
                    ls -la ./
                    docker builder prune -af

name: Build multi-arch image (reusable)

on:
    workflow_call:
        inputs:
            dockerfile:
                description: "Path to Dockerfile"
                type: string
                required: true
            image:
                description: "Fully qualified image name (e.g. ghcr.io/valksor/debian)"
                type: string
                required: true
            tag:
                description: "Base tag; used as ${image}:${tag}-${arch}"
                type: string
                required: false
                default: "latest"
            build_args:
                description: "Build args (newline-separated NAME=VALUE)"
                type: string
                required: false
                default: ""
            no_cache:
                description: "Pass --no-cache to the build"
                type: string
                required: false
                default: "false"

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    -   arch: arm64
                        runs-on: self-arm
                    -   arch: amd64
                        runs-on: ubuntu-latest
        runs-on: ${{ matrix.runs-on }}
        steps:
            -   name: checkout
                uses: actions/checkout@v6

            -   name: Login GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Login DockerHub
                uses: docker/login-action@v3
                with:
                    registry: docker.io
                    username: ${{ secrets.DH_USERNAME }}
                    password: ${{ secrets.DH_TOKEN }}

            -   name: build
                uses: ./.github/actions/build-simple
                with:
                    dockerfile: ${{ inputs.dockerfile }}
                    arch: ${{ matrix.arch }}
                    tags: |
                        ${{ inputs.image }}:${{ inputs.tag }}-${{ matrix.arch }}
                    build-args: ${{ inputs.build_args }}
                    no_cache: ${{ inputs.no_cache }}

    manifest:
        needs: build
        runs-on: self-arm
        if: always() && needs.build.result == 'success'
        steps:
            -   name: checkout
                uses: actions/checkout@v6

            -   name: Login GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.repository_owner }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: manifest
                uses: ./.github/actions/manifest-multiarch
                with:
                    image: ${{ inputs.image }}
                    tag: ${{ inputs.tag }}
